<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard de Despachos · Biogreen</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#00833e;--green-dark:#006e34;--green-900:#0e3b22;--green-800:#005a2a;
  --sage:#b5ceac;--sage-100:#e9f1e5;--sage-50:#f3f8f1;
  --gray-50:#f7f9f6;--gray-100:#eef1ed;--gray-200:#e2e6e1;--gray-400:#9aa09a;
  --gray-500:#767c76;--gray-700:#4d4d4d;--gray-800:#333333;--gray-900:#1a1a1a;--white:#fff;
  --warn:#b8770a;--warn-soft:#fbf1de;--neg:#c0392b;--neg-soft:#fbecea;
  --shadow:0 1px 3px rgba(14,59,34,.06),0 8px 22px rgba(14,59,34,.05);
  --r:14px;--r-sm:10px;
}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;}

.header{background:var(--green-900);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;}
.header h1{color:#fff;font-size:18px;font-weight:800;}
.header .sub{color:rgba(255,255,255,.6);font-size:12px;margin-top:2px;}
.btn-refresh{background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);
  padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-refresh:hover{background:var(--green-dark);}
.btn-refresh:disabled{opacity:.6;cursor:not-allowed;}

.wrap{max-width:1100px;margin:0 auto;padding:24px 20px 50px;}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 20px;border:1px solid var(--gray-200);}
.kpi-lbl{font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;}
.kpi-val{font-size:28px;font-weight:800;color:var(--green-900);margin-top:6px;}
.kpi.warn .kpi-val{color:var(--warn);}
.kpi-note{font-size:11px;color:var(--gray-500);margin-top:4px;}

.section{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;
  margin-bottom:16px;border:1px solid var(--gray-200);}
.section-title{font-size:13px;font-weight:700;color:var(--gray-700);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:16px;}

.courier-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
.courier-card{background:var(--sage-50);border:1px solid var(--sage-100);border-radius:var(--r-sm);padding:14px 16px;}
.courier-name{font-size:13px;font-weight:800;color:var(--green-900);margin-bottom:8px;}
.estado-row{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0;color:var(--gray-700);}
.estado-row b{color:var(--gray-900);}

.region-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;}
.region-card{border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:14px 16px;}
.region-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.region-name{font-size:13px;font-weight:800;color:var(--green-900);}
.region-avg{font-size:20px;font-weight:800;color:var(--gray-900);}
.region-avg small{font-size:11px;font-weight:600;color:var(--gray-400);}
.comuna-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--gray-700);
  border-top:1px solid var(--gray-100);}
.comuna-row:first-of-type{border-top:none;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 10px;color:var(--gray-400);font-weight:700;font-size:11px;
  text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--gray-100);}
td{padding:10px;border-bottom:1px solid var(--gray-100);}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge.entregado{background:var(--sage-100);color:var(--green-800);}
.badge.transito{background:var(--gray-100);color:var(--gray-700);}
.badge.anulado{background:var(--neg-soft);color:var(--neg);}
.dias-num{font-weight:700;}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filters select,.filters input{padding:8px 12px;border:1px solid var(--gray-200);border-radius:var(--r-sm);
  font-size:13px;font-family:inherit;}

.loading{text-align:center;padding:60px;color:var(--gray-400);}
.hidden{display:none!important;}
.empty{text-align:center;padding:30px;color:var(--gray-400);font-size:13px;}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📦 Dashboard de Despachos</h1>
    <div class="sub" id="syncInfo">Cargando...</div>
  </div>
  <button class="btn-refresh" id="btnRefresh" onclick="sincronizarAhora()">🔄 Sincronizar ahora</button>
</div>

<div class="wrap">

  <div id="loadingBox" class="loading">Cargando datos...</div>

  <div id="content" class="hidden">

    <div class="kpis">
      <div class="kpi">
        <div class="kpi-lbl">Pedidos activos</div>
        <div class="kpi-val" id="kpiTotal">0</div>
        <div class="kpi-note">Todos los couriers</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">En tránsito</div>
        <div class="kpi-val" id="kpiTransito">0</div>
        <div class="kpi-note">Aún no entregados</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">Con tracking en vivo</div>
        <div class="kpi-val" id="kpiApi">0</div>
        <div class="kpi-note">Alas / Blue Express (API)</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">Couriers activos</div>
        <div class="kpi-val" id="kpiCouriers">0</div>
        <div class="kpi-note">Con pedidos en curso</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Estado por courier</div>
      <div class="courier-grid" id="courierGrid"></div>
    </div>

    <div class="section">
      <div class="section-title">Días en tránsito por región y comuna</div>
      <div class="region-grid" id="regionGrid"></div>
    </div>

    <div class="section">
      <div class="section-title">Detalle de pedidos</div>
      <div class="filters">
        <select id="filterCourier" onchange="renderTabla()">
          <option value="">Todos los couriers</option>
        </select>
        <select id="filterRegion" onchange="renderTabla()">
          <option value="">Todas las regiones</option>
        </select>
        <select id="filterEstado" onchange="renderTabla()">
          <option value="">Todos los estados</option>
          <option value="transito">Solo en tránsito</option>
          <option value="entregado">Solo entregados</option>
        </select>
        <input type="text" id="filterPedido" placeholder="Buscar N° pedido..." oninput="renderTabla()"/>
      </div>
      <div id="tablaWrap"></div>
    </div>

  </div>
</div>

<script>
let DATA = null;

function cargarDatos() {
  google.script.run
    .withSuccessHandler(onDatos)
    .withFailureHandler(onError)
    .obtenerDashboardData();
}

function onDatos(dataStr) {
  const data = typeof dataStr === 'string' ? JSON.parse(dataStr) : dataStr;
  DATA = data;
  document.getElementById('loadingBox').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');

  document.getElementById('kpiTotal').textContent = data.totalActivos;
  document.getElementById('kpiTransito').textContent = data.enTransito;
  document.getElementById('kpiApi').textContent = data.conTrackingApi;
  document.getElementById('kpiCouriers').textContent = Object.keys(data.porCourier).length;

  document.getElementById('syncInfo').textContent = data.ultimaSync
    ? 'Última sincronización: ' + fmtFecha(data.ultimaSync)
    : 'Aún no se ha sincronizado — usa "Sincronizar ahora"';

  renderCourierGrid();
  renderRegionGrid();
  poblarFiltros();
  renderTabla();
}

function onError(e) {
  document.getElementById('loadingBox').textContent = 'Error: ' + e.message;
}

function renderCourierGrid() {
  const grid = document.getElementById('courierGrid');
  grid.innerHTML = '';
  const couriers = Object.keys(DATA.porCourier);

  if (!couriers.length) {
    grid.innerHTML = '<div class="empty">Sin datos sincronizados aún.</div>';
    return;
  }

  couriers.forEach(courier => {
    const estados = DATA.porCourier[courier];
    const card = document.createElement('div');
    card.className = 'courier-card';
    let rows = Object.entries(estados)
      .sort((a,b) => b[1]-a[1])
      .map(([estado, n]) => `<div class="estado-row"><span>${estado}</span><b>${n}</b></div>`)
      .join('');
    card.innerHTML = `<div class="courier-name">${courier}</div>${rows}`;
    grid.appendChild(card);
  });
}

function renderRegionGrid() {
  const grid = document.getElementById('regionGrid');
  grid.innerHTML = '';
  const regiones = Object.keys(DATA.porRegion).sort((a,b) => DATA.porRegion[b].promedioDias - DATA.porRegion[a].promedioDias);

  if (!regiones.length) {
    grid.innerHTML = '<div class="empty">Sin pedidos en tránsito por ahora.</div>';
    return;
  }

  regiones.forEach(region => {
    const r = DATA.porRegion[region];
    const card = document.createElement('div');
    card.className = 'region-card';
    const comunasHtml = Object.entries(r.comunas)
      .sort((a,b) => b[1].promedioDias - a[1].promedioDias)
      .map(([comuna, c]) => `<div class="comuna-row"><span>${comuna}</span><span>${c.promedioDias} días <small>(${c.totalEnTransito})</small></span></div>`)
      .join('');
    card.innerHTML = `
      <div class="region-head">
        <span class="region-name">${region}</span>
        <span class="region-avg">${r.promedioDias}<small> días prom.</small></span>
      </div>
      ${comunasHtml}`;
    grid.appendChild(card);
  });
}

function poblarFiltros() {
  const selCourier = document.getElementById('filterCourier');
  const selRegion  = document.getElementById('filterRegion');
  [...new Set(DATA.detalle.map(d => d.courier))].forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    selCourier.appendChild(opt);
  });
  [...new Set(DATA.detalle.map(d => d.region))].forEach(r => {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    selRegion.appendChild(opt);
  });
}

function renderTabla() {
  const courierF = document.getElementById('filterCourier').value;
  const regionF  = document.getElementById('filterRegion').value;
  const estadoF  = document.getElementById('filterEstado').value;
  const pedidoF  = document.getElementById('filterPedido').value.trim();

  let rows = DATA.detalle.filter(d => {
    if (courierF && d.courier !== courierF) return false;
    if (regionF && d.region !== regionF) return false;
    if (estadoF === 'transito' && d.entregado) return false;
    if (estadoF === 'entregado' && !d.entregado) return false;
    if (pedidoF && !String(d.pedido).includes(pedidoF)) return false;
    return true;
  }).sort((a,b) => (b.diasEnTransito||0) - (a.diasEnTransito||0));

  const wrap = document.getElementById('tablaWrap');
  if (!rows.length) {
    wrap.innerHTML = '<div class="empty">No hay pedidos que coincidan con el filtro.</div>';
    return;
  }

  let html = '<table><thead><tr><th>Pedido</th><th>Courier</th><th>Región</th><th>Comuna</th><th>Estado</th><th>Situación</th><th>Días en tránsito</th><th>Fuente</th></tr></thead><tbody>';
  rows.forEach(d => {
    const esAnulado = /anula/i.test(d.estado);
    const situacion = esAnulado ? 'Anulado' : (d.entregado ? 'Entregado' : 'En tránsito');
    const claseBadge = esAnulado ? 'anulado' : (d.entregado ? 'entregado' : 'transito');
    html += `<tr>
      <td><b>${d.pedido}</b></td>
      <td>${d.courier}</td>
      <td>${d.region}</td>
      <td>${d.comuna}</td>
      <td>${d.estado}</td>
      <td><span class="badge ${claseBadge}">${situacion}</span></td>
      <td class="dias-num">${d.diasEnTransito != null ? d.diasEnTransito : '—'}</td>
      <td>${d.fuente === 'API' ? '🟢 En vivo' : '✏️ Manual'}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function sincronizarAhora() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  btn.textContent = '⏳ Sincronizando...';

  google.script.run
    .withSuccessHandler(() => {
      btn.disabled = false;
      btn.textContent = '🔄 Sincronizar ahora';
      cargarDatos();
    })
    .withFailureHandler((e) => {
      btn.disabled = false;
      btn.textContent = '🔄 Sincronizar ahora';
      alert('Error al sincronizar: ' + e.message);
    })
    .sincronizarTracking();
}

function fmtFecha(val) {
  if (!val) return '—';
  try {
    const d = new Date(val);
    return d.toLocaleDateString('es-CL', {day:'numeric',month:'short'}) + ' ' +
           d.toLocaleTimeString('es-CL', {hour:'2-digit',minute:'2-digit'});
  } catch { return String(val); }
}

cargarDatos();
</script>
</body>
</html>
